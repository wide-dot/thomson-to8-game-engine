# ******************************************************************************
# Game Mode "road-debug" — validation du placement (200 lignes + offset LEFT/RIGHT)
# Reproduit la conf du mode "road" ; seul engine.asm.mainEngine change.
# Réutilise les mêmes objets / data / palette générés (pas de régénération).
# ******************************************************************************

engine.asm.mainEngine=./game-mode/road-debug/main.asm

# Objects (identiques au mode road)
object.PlayerOne=./objects/player-one/player-one.properties
object.RoadBuffers=./objects/road-buffers/obj.properties
object.Mask=./objects/mask/mask.properties

# Palettes (réutilise celle du mode road)
palette.Pal_Road=./game-mode/road/palette/default.png

# Acts definition
actBoot=default
act.default.palette=Pal_Road
act.default.screenBorder=8
act.default.backgroundSolid=8

# Fixed-address Data (identiques au mode road)
data.RoadPatternsDark=./game-mode/road/generated/road_patterns_dark.bin;3;$0000
data.PerspRecipA=./engine/projection/Persp_Recip_paged.bin;3;$1200
data.RoadPatternsLight=./game-mode/road/generated/road_patterns_light.bin;3;$2000
data.PerspRecipB=./engine/projection/Persp_Recip_paged.bin;3;$3200
