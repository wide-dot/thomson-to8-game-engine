code=./objects/music/starfield/starfield.asm

# Sound - assets only, no object code. The players live in the main engine and
# are ticked once per frame from the 50Hz IRQ.
#
# "Aleste" (Power Strike, Compile 1988, Sega Master System) - main theme.
# The two assets come from TWO DIFFERENT rips of the same tune, on purpose:
# a Master System muted its PSG when the FM Sound Unit was fitted, so no single
# commercial rip carries both chips. SMS Power publishes them separately, and
# the engine drives whichever card is present.
#   SN76489 <- resources/aleste-01-psg.vgm  (PowerStrike-SMS-PSG pack)
#   YM2413  <- resources/aleste-01-fm.vgm   (PowerStrike-SMS-FM  pack)
# Regenerate with 6809-game-builder (see resources/README for the exact args).
sound.Vgc_alesteSN=./objects/music/starfield/aleste-SN76489.vgc
sound.Vgc_alesteYM=./objects/music/starfield/aleste-YM2413.ymm.zx0
