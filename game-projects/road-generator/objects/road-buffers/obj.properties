# road_buffers — objet "data-only" déclaré pour le mécanisme knapsack
#
# Contenu : buffers Line_NNNN générés par compile_road_sprites.py
# (= header M (1 oct) + pointeurs Road_R* pour chaque combinaison scanline ×
#  sub-pixel × palette ; K/J non stockés, recalculés au runtime).
#
# Pas de sprite/animation/sound : pure data, ne s'exécute jamais.
# Le code 6809 consulte les Line_NNNN via les EQUs résolus par
# road_buffers_externs.inc (= inclus dans le résident game-mode).
#
# Au runtime, DRAW_FRAME_ROAD mount cette page en cart zone via :
#     lda  Obj_Index_Page+ObjID_RoadBuffers
#     _SetCartPageA
# avant de déréférencer une Line_NNNN.

code=./objects/road-buffers/road_buffers_data.asm
