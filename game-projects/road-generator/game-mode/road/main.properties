# ******************************************************************************
# Game Mode "road"
# ******************************************************************************

engine.asm.mainEngine=./game-mode/road/main.asm

# Objects
# Port Lotus TO8 :
#   - PlayerOne   = physique pilote (drain input buffer + tick Lotus_PhysicsTick)
# AiCar EXISTE mais N'EST PAS référencé ici (mock préservé pour activation future).
object.PlayerOne=./objects/player-one/player-one.properties
# road_buffers (15.6 Ko, 800 Line_NNNN) déclaré comme objet code-only
# → knapsack alloue une page 4+, exposée via Obj_Index_Page[ObjID_RoadBuffers].
# DRAW_FRAME_ROAD mount cette page en cart zone via _SetCartPageA pour lire
# les Line_NNNN. L'objet N'EST PAS ajouté à la run-list (= pas exécuté).
object.RoadBuffers=./objects/road-buffers/obj.properties
object.Mask=./objects/mask/mask.properties

# Palettes (extraite du PNG road)
palette.Pal_Road=./game-mode/road/palette/default.png

# Acts definition
actBoot=default
act.default.palette=Pal_Road
act.default.screenBorder=8
act.default.backgroundSolid=8

# Fixed-address Data (task #E preparation)
# data.<NomLogique>=<path>;<page>;<offset>
# Chargé à page+offset RAM imposés (hors knapsack).
# Pour la route Lotus on charge tout en page 3 (= page video libre pendant load),
# le game-mode init recopiera vers page 0 (RAMA / RAMB demi-pages) au boot.
#
# Demi-page = $2000 (8192 o). Layout par demi-page (Option A) :
#   patterns (4497 o) à offset 0  +  persp_recip (3584 o, padding retiré) après.
#   HP0 : dark  $0000-$1190 | perspA $1200-$1FFF   (cart-view $4000 / $5200)
#   HP1 : light $2000-$3190 | perspB $3200-$3FFF
# Le persp est packé à $1200/$3200 (= base runtime $5200, cf PerspectiveTables
# LI_TABLE_A_BASE) pour laisser de la place aux 66 routines Road_draw.
data.RoadPatternsDark=./game-mode/road/generated/road_patterns_dark.bin;3;$0000
data.PerspRecipA=./engine/projection/Persp_Recip_paged.bin;3;$1200
data.RoadPatternsLight=./game-mode/road/generated/road_patterns_light.bin;3;$2000
data.PerspRecipB=./engine/projection/Persp_Recip_paged.bin;3;$3200
