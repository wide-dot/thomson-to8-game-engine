engine.asm.mainEngine=./game-mode/00/main.asm

# Palette + act
palette.Pal_starfield=./game-mode/00/image/palette.png
actBoot=default
act.default.palette=Pal_starfield
act.default.screenBorder=0
act.default.backgroundSolid=0
# The GENERATED LoadAct (generated-code/starfield/BuilderMainGenCode.asm) clears
# both video pages and blits this through DrawFullscreenImage -- which is why
# global-trailer-includes.asm must pull that routine in even though no
# hand-written code here calls it. LoadAct runs inside _gameMode.init, so both
# pages hold the pristine nebula by the time main.asm reaches its BandSave calls
# -- which is the one moment the scenario's snapshots can be taken.
act.default.backgroundImage=./game-mode/00/image/nebuleuse.png

# Objects
object.title=./objects/title/title.properties
object.byfx=./objects/byfx/byfx.properties

# Music (asset-only object: declares Vgc_starfieldSN)
object.MusicStarfield=./objects/music/starfield/starfield.properties
