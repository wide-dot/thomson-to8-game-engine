# ******************************************************************************
# Game Mode "road-stream" — variante streaming (frames Dense_Buffer précalculées)
# ******************************************************************************

engine.asm.mainEngine=./game-mode/road-stream/main.asm

# Objects — ORDRE IMPORTANT : les ObjID sont assignés dans l'ordre de déclaration.
#   RoadStreamP0..P8 DOIVENT être consécutifs (le décodeur fait
#   Obj_Index_Page+ObjID_RoadStreamP0+chunk pour trouver la page d'un chunk).
object.PlayerOne=./objects/player-one/player-one.properties
# RoadEngine : routine #0 (Init) pose Circuit_base/nb (lus par la physique).
#   #1 (SP+LI) N'EST PLUS appelé -> le code SP/LI reste en page mais hors loop.
object.RoadEngine=./objects/road-engine/obj.properties

# --- road-stream data : 1 objet code-only par page logique (chunk de 16384 o) ---
object.RoadStreamP0=./objects/road-stream-data/chunk_00.properties
object.RoadStreamP1=./objects/road-stream-data/chunk_01.properties
object.RoadStreamP2=./objects/road-stream-data/chunk_02.properties
object.RoadStreamP3=./objects/road-stream-data/chunk_03.properties
object.RoadStreamP4=./objects/road-stream-data/chunk_04.properties
object.RoadStreamP5=./objects/road-stream-data/chunk_05.properties
object.RoadStreamP6=./objects/road-stream-data/chunk_06.properties
object.RoadStreamP7=./objects/road-stream-data/chunk_07.properties
object.RoadStreamP8=./objects/road-stream-data/chunk_08.properties

# road_buffers (Line_NNNN, lu par DrawFrameRoad via _SetCartPageA) — INCHANGÉ.
object.RoadBuffers=./objects/road-buffers/obj.properties
object.Mask=./objects/mask/mask.properties

# Palette
palette.Pal_Road=./game-mode/road/palette/default.png

# Acts definition
actBoot=default
act.default.palette=Pal_Road
act.default.screenBorder=8
act.default.backgroundSolid=8

# Fixed-address Data (patterns + persp recip, page 3 -> recopiés page 0 au boot)
data.RoadPatternsDark=./game-mode/road/generated/road_patterns_dark.bin;3;$0000
data.PerspRecipA=./engine/projection/Persp_Recip_paged.bin;3;$1200
data.RoadPatternsLight=./game-mode/road/generated/road_patterns_light.bin;3;$2000
data.PerspRecipB=./engine/projection/Persp_Recip_paged.bin;3;$3200
