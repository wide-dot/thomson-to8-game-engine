# ******************************************************************************
# Game Mode "road"
# ******************************************************************************

engine.asm.mainEngine=./game-mode/road/main.asm

# Objects
# Port Lotus TO8 :
#   - Road        = décor (sprite road.png, palette statique)
#   - PlayerOne   = physique pilote (drain input buffer + tick Lotus_PhysicsTick)
# AiCar EXISTE mais N'EST PAS référencé ici (mock préservé pour activation future).
object.Road=./objects/road/road.properties
object.PlayerOne=./objects/player-one/player-one.properties

# Palettes (extraite du PNG road)
palette.Pal_Road=./objects/road/image/road.png

# Acts definition
actBoot=default
act.default.palette=Pal_Road
act.default.screenBorder=15
act.default.backgroundSolid=15

# Fixed-address Data (task #E preparation)
# data.<NomLogique>=<path>;<page>;<offset>
# Chargé à page+offset RAM imposés (hors knapsack).
# Pour la route Lotus on charge tout en page 3 (= page video libre pendant load),
# le game-mode init recopiera vers page 0 (RAMA / RAMB demi-pages) au boot.
data.RoadPatternsDark=./tools/output/road_lines_ram/road_patterns_dark.bin;3;$0000
data.PerspRecipA=./engine/projection/Persp_Recip_paged.bin;3;$1000
data.RoadPatternsLight=./tools/output/road_lines_ram/road_patterns_light.bin;3;$2000
data.PerspRecipB=./engine/projection/Persp_Recip_paged.bin;3;$3000
